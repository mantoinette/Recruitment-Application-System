# Database URL is resolved in DatabaseConfig (supports Render postgresql:// URLs)
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB
server.port=${PORT:8080}

# Comma-separated list, e.g. https://your-frontend.onrender.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

