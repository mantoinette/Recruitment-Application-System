services:
  postgres:
    image: postgres:16-alpine
    container_name: recruitpro-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: recruitment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - recruitpro_pg_data:/var/lib/postgresql/data

volumes:
  recruitpro_pg_data:
